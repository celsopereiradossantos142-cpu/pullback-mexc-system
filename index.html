<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Pullback Long</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
  padding: 30px;
}
button {
  padding: 15px 30px;
  font-size: 18px;
  background: #00c853;
  border: none;
  border-radius: 8px;
  color: white;
}
.card {
  margin-top: 30px;
  padding: 20px;
  background: #222;
  border-radius: 10px;
}
</style>
</head>
<body>

<h2>Sistema Pullback Long</h2>
<button onclick="analisar()">Analisar</button>
<div id="resultado"></div>

<script>
async function analisar() {
  document.getElementById("resultado").innerHTML = "Analisando...";

  try {
    const response = await fetch("https://contract.mexc.com/api/v1/contract/ticker");
    const data = await response.json();

    let oportunidades = [];

    data.data.forEach(item => {
      if(item.symbol.endsWith("USDT")) {

        let variacao = item.riseFallRate * 100;
        let preco = parseFloat(item.lastPrice);

        // Filtro simples de pullback leve
        if(variacao > 0.5 && variacao < 3) {
          oportunidades.push({
            par: item.symbol,
            entrada: (preco * 0.995).toFixed(4),
            alvo: (preco * 1.01).toFixed(4),
            score: (80 + variacao).toFixed(1)
          });
        }
      }
    });

    if(oportunidades.length > 0) {
      let op = oportunidades[0];

      document.getElementById("resultado").innerHTML =
        `<div class="card">
          <h3>${op.par}</h3>
          <p>Entrada: ${op.entrada}</p>
          <p>Alvo: ${op.alvo}</p>
          <p>Alavancagem sugerida: 3x</p>
          <p>Score: ${op.score}%</p>
        </div>`;
    } else {
      document.getElementById("resultado").innerHTML =
        "<div class='card'>Nenhuma oportunidade encontrada agora.</div>";
    }

  } catch(error) {
    document.getElementById("resultado").innerHTML =
      "<div class='card'>Erro ao conectar com a MEXC.</div>";
  }
}
</script>

</body>
</html>
